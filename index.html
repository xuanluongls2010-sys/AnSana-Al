<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnSana AI - Góc Chữa Lành</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #fcfaf7; }
        .app-container { width: 100%; height: 100%; position: relative; overflow: hidden; }
        /* Dịch khung lên trên đúng 50px để giấu thanh công cụ Google AI Studio */
        iframe {
            width: 100%;
            height: calc(100% + 50px); 
            position: absolute;
            top: -50px; 
            left: 0;
            border: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Thay LINK_SHARE_CỦA_CẬU vào đoạn dưới này nhé -->
        <iframe src=https://ai.studio/apps/96ae997c-c3ee-4843-bb09-7dfe68b994f6 allow="clipboard-read; clipboard-write; microphone"></iframe>
    </div>
</body>
</html>
